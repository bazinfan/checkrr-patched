name: Build patched checkrr

on:
  schedule:
    # Daily at 06:00 UTC — after upstream's release cadence and before
    # the local Watchtower scan at 04:00 CEST the next day.
    - cron: '0 6 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/build.yml'

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/checkrr-patched

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve latest upstream release
        id: upstream
        run: |
          set -euo pipefail
          tag=$(curl -fsSL https://api.github.com/repos/aetaric/checkrr/releases/latest | jq -r '.tag_name')
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "Could not resolve upstream tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Upstream latest: $tag"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip build if this tag is already published
        id: have
        run: |
          set -euo pipefail
          if docker manifest inspect "${IMAGE}:${{ steps.upstream.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Already published ${IMAGE}:${{ steps.upstream.outputs.tag }} — skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether upstream now ships the locale fix
        id: locale
        run: |
          set -euo pipefail
          url="https://raw.githubusercontent.com/aetaric/checkrr/${{ steps.upstream.outputs.tag }}/locale/locale.en.toml"
          if curl -fsSL "$url" | grep -qE '^\[NotificationsTelegramError\]'; then
            echo "fixed=true" >> "$GITHUB_OUTPUT"
            echo "Upstream includes NotificationsTelegramError — patch step will be a no-op."
          else
            echo "fixed=false" >> "$GITHUB_OUTPUT"
            echo "Upstream still missing the key — patch will be applied."
          fi

      - name: Set up Docker Buildx
        if: steps.have.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.have.outputs.exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            CHECKRR_VERSION=${{ steps.upstream.outputs.tag }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.upstream.outputs.tag }}

      - name: Notify via Telegram if upstream patch is now redundant
        if: steps.locale.outputs.fixed == 'true'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${TG_TOKEN:-}" ] || [ -z "${TG_CHAT:-}" ]; then
            echo "TELEGRAM_TOKEN / TELEGRAM_CHAT_ID secrets not set — skipping notification."
            exit 0
          fi
          msg="checkrr ${{ steps.upstream.outputs.tag }} ships NotificationsTelegramError natively. The local patch is now redundant — switch your compose image from ${IMAGE}:latest back to aetaric/checkrr:latest and archive this repo when convenient."
          curl -fsSL -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${msg}" >/dev/null
          echo "Telegram notification sent."
